# Render Blueprint for Kon-firm.
#
# One service: a single Go binary serving the API and the embedded frontend.
# There is no separate frontend host, so there is nothing to keep in sync.
#
# Secrets are declared with `sync: false`, which means Render prompts for them
# in the dashboard rather than reading them from this file. Never put a real
# key in here — this file is committed.

services:
  - type: web
    name: konfirm
    runtime: go
    plan: free
    region: frankfurt # closest free region to Lagos
    buildCommand: go build -o konfirm ./cmd/server
    startCommand: ./konfirm
    healthCheckPath: /api/health
    envVars:
      - key: MONNIFY_API_KEY
        sync: false
      - key: MONNIFY_SECRET_KEY
        sync: false
      - key: MONNIFY_CONTRACT_CODE
        sync: false

      - key: MONNIFY_BASE_URL
        value: https://sandbox.monnify.com

      # Must match the deployed URL. Update after the first deploy, once
      # Render has assigned the hostname.
      - key: KONFIRM_REDIRECT_URL
        sync: false

      - key: DATABASE_URL
        sync: false

      # Bootstrap admin. Someone must be able to sign in before anyone can be
      # granted a role, so the first admin comes from configuration.
      #
      # The password is re-hashed from this value on every boot, so rotating it
      # is a matter of changing it here and redeploying.
      - key: KONFIRM_ADMIN_PHONE
        sync: false
      - key: KONFIRM_ADMIN_PASSWORD
        sync: false
      - key: KONFIRM_ADMIN_NAME
        value: Store Manager

      # ENV=production turns on Secure cookies and the __Host- prefix. Setting
      # this to anything else on a public deployment sends session cookies
      # without the Secure flag.
      # Email receipts. Without these a customer whose browser was not
      # redirected back from Monnify has no proof of purchase at all.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_PORT
        value: "587"

      - key: ENV
        value: production
