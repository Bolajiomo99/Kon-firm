<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My orders — Kon-firm</title>
<link rel="icon" href="/img/favicon-64.png" type="image/png">
<link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<a class="skip" href="#main">Skip to content</a>

<header class="site-header">
  <div class="wrap nav">
    <a class="brand" href="/">
      <img class="logo-img" src="/img/logo-512.png" alt="" width="512" height="512">
      <span class="brand-text">Kon-firm</span>
    </a>
    <nav class="nav-links" aria-label="Main">
      <a href="/">Store</a>
      <span id="theme-toggle"></span>
      <span id="account-nav" style="display:flex;gap:4px;align-items:center"></span>
    </nav>
  </div>
</header>

<main id="main" class="wrap" style="padding:clamp(28px,4vw,48px) 0 clamp(48px,6vw,72px);max-width:960px">
  <div class="section-head" style="margin-bottom:20px">
    <div>
      <h1 class="display" style="font-size:clamp(1.8rem,3.5vw,2.6rem)">My orders</h1>
      <p style="color:var(--text-muted);margin:4px 0 0">
        Everything you have bought, and where each one stands.
      </p>
    </div>
    <span class="live-pill"><span class="dot" aria-hidden="true"></span><span id="live-status">Live</span></span>
  </div>

  <div class="stats" id="order-stats" style="margin-bottom:26px"></div>

  <div class="error-box" id="error" hidden role="alert"></div>

  <div id="orders-list"></div>
</main>

<footer class="site-footer"></footer>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script src="/js/orders.js" type="module"></script>
</body>
</html>
